services:
  yt-loader:
    build: .
    container_name: yt-loader
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      YT_LOADER_USERNAME: ${YT_LOADER_USERNAME:-admin}
      YT_LOADER_PASSWORD: ${YT_LOADER_PASSWORD:?Set YT_LOADER_PASSWORD in .env}
      FFMPEG_PRESET: ${FFMPEG_PRESET:-veryfast}
      FFMPEG_CRF: ${FFMPEG_CRF:-22}
      YT_LOADER_RETENTION_HOURS: ${YT_LOADER_RETENTION_HOURS:-24}
      YT_LOADER_AFTER_DOWNLOAD_MINUTES: ${YT_LOADER_AFTER_DOWNLOAD_MINUTES:-15}
      YT_LOADER_READY_HOURS: ${YT_LOADER_READY_HOURS:-24}
      YOUTUBE_COOKIES: /cookies/www.youtube.com_cookies.txt
    volumes:
      - ./server_data:/data
      - ./cookies:/cookies
