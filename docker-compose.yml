x-app-environment: &app-environment
  DATABASE_URL: postgresql+psycopg://yt_loader:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/yt_loader
  FFMPEG_PRESET: ${FFMPEG_PRESET:-veryfast}
  FFMPEG_CRF: ${FFMPEG_CRF:-22}
  YT_LOADER_RETENTION_HOURS: ${YT_LOADER_RETENTION_HOURS:-24}
  YT_LOADER_AFTER_DOWNLOAD_MINUTES: ${YT_LOADER_AFTER_DOWNLOAD_MINUTES:-15}
  YT_LOADER_READY_HOURS: ${YT_LOADER_READY_HOURS:-24}
  YT_LOADER_SECURE_COOKIES: ${YT_LOADER_SECURE_COOKIES:-true}
  YT_LOADER_ALLOWED_HOSTS: ${YT_LOADER_ALLOWED_HOSTS:-}
  YT_LOADER_ENABLE_API_DOCS: ${YT_LOADER_ENABLE_API_DOCS:-false}
  YT_LOADER_SESSION_DAYS: ${YT_LOADER_SESSION_DAYS:-14}
  YT_LOADER_ALLOW_REGISTRATION: ${YT_LOADER_ALLOW_REGISTRATION:-true}
  YT_LOADER_SIGNUP_CREDITS: ${YT_LOADER_SIGNUP_CREDITS:-5}
  YT_LOADER_TRIAL_DAYS: ${YT_LOADER_TRIAL_DAYS:-14}
  YT_LOADER_JOB_LEASE_SECONDS: ${YT_LOADER_JOB_LEASE_SECONDS:-120}
  YT_LOADER_JOB_POLL_SECONDS: ${YT_LOADER_JOB_POLL_SECONDS:-0.5}
  YT_LOADER_MAX_OVERLAY_MB: ${YT_LOADER_MAX_OVERLAY_MB:-256}
  YT_LOADER_MAX_CONTENT_FILE_MB: ${YT_LOADER_MAX_CONTENT_FILE_MB:-250}
  YT_LOADER_MIN_FREE_DISK_MB: ${YT_LOADER_MIN_FREE_DISK_MB:-2048}
  YT_LOADER_FEATURE_WORKSPACE_DEPTH_SHELL: ${YT_LOADER_FEATURE_WORKSPACE_DEPTH_SHELL:-false}
  YT_LOADER_FEATURE_CHAT_ANYWHERE: ${YT_LOADER_FEATURE_CHAT_ANYWHERE:-false}
  YT_LOADER_FEATURE_ASSET_VIEWER: ${YT_LOADER_FEATURE_ASSET_VIEWER:-false}
  YT_LOADER_FEATURE_ASSET_REVIEWS: ${YT_LOADER_FEATURE_ASSET_REVIEWS:-false}
  YT_LOADER_FEATURE_PROJECT_GRAPH: ${YT_LOADER_FEATURE_PROJECT_GRAPH:-false}
  YT_LOADER_FEATURE_DECISION_INTELLIGENCE: ${YT_LOADER_FEATURE_DECISION_INTELLIGENCE:-false}
  YOUTUBE_COOKIES: /cookies/www.youtube.com_cookies.txt
  VK_COOKIES: /cookies/vk.com_cookies.txt
  RUTUBE_COOKIES: /cookies/rutube.ru_cookies.txt

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yt_loader
      POSTGRES_USER: yt_loader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yt_loader -d yt_loader"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    build: .
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  yt-loader:
    build: .
    container_name: yt-loader
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      <<: *app-environment
      YT_LOADER_LEGACY_BASIC_AUTH: ${YT_LOADER_LEGACY_BASIC_AUTH:-false}
      YT_LOADER_USERNAME: ${YT_LOADER_USERNAME:-admin}
      YT_LOADER_PASSWORD: ${YT_LOADER_PASSWORD:-}
      YT_LOADER_PUBLIC_BASE_URL: ${YT_LOADER_PUBLIC_BASE_URL:-}
      YT_LOADER_REQUIRE_EMAIL_VERIFICATION: ${YT_LOADER_REQUIRE_EMAIL_VERIFICATION:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURITY: ${SMTP_SECURITY:-starttls}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      YT_LOADER_RENEWAL_INTERVAL_SECONDS: ${YT_LOADER_RENEWAL_INTERVAL_SECONDS:-3600}
      YT_LOADER_WEBHOOK_RETENTION_DAYS: ${YT_LOADER_WEBHOOK_RETENTION_DAYS:-90}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_WEBHOOK_ENFORCE_IP: ${YOOKASSA_WEBHOOK_ENFORCE_IP:-true}
      YOOKASSA_RECEIPT_ENABLED: ${YOOKASSA_RECEIPT_ENABLED:-false}
      YOOKASSA_VAT_CODE: ${YOOKASSA_VAT_CODE:-1}
      YT_LOADER_ENABLE_PAYMENTS: ${YT_LOADER_ENABLE_PAYMENTS:-false}
      YT_LOADER_REQUIRE_LEGAL_ACCEPTANCE: ${YT_LOADER_REQUIRE_LEGAL_ACCEPTANCE:-true}
      YT_LOADER_LEGAL_SELLER_NAME: ${YT_LOADER_LEGAL_SELLER_NAME:-}
      YT_LOADER_LEGAL_SELLER_INN: ${YT_LOADER_LEGAL_SELLER_INN:-}
      YT_LOADER_LEGAL_SELLER_ADDRESS: ${YT_LOADER_LEGAL_SELLER_ADDRESS:-}
      YT_LOADER_LEGAL_SUPPORT_EMAIL: ${YT_LOADER_LEGAL_SUPPORT_EMAIL:-support@allasplanned.ru}
      YT_LOADER_LEGAL_VERSION: ${YT_LOADER_LEGAL_VERSION:-2026-07-17}
      YT_LOADER_LEGAL_DOCUMENTS_APPROVED: ${YT_LOADER_LEGAL_DOCUMENTS_APPROVED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-5.4-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1.5}
      OPENAI_IMAGE_QUALITY: ${OPENAI_IMAGE_QUALITY:-medium}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      OPENAI_AUDIO_CHUNK_SECONDS: ${OPENAI_AUDIO_CHUNK_SECONDS:-2700}
      YT_LOADER_METRICS_TOKEN: ${YT_LOADER_METRICS_TOKEN:-}
    volumes:
      - ./server_data:/data:rw
      - ./cookies:/cookies:rw
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  backend:
